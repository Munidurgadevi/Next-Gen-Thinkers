  Used GitHub Copilot for autocomplete. No candidate data was fed to any LLM.


methodology_summary: |
 
Our solution is an AI-powered candidate ranking system designed to identify the most suitable candidates for a given Job Description. The system begins by processing the Job Description to understand its key requirements and loads candidate profiles from the dataset for evaluation. Each candidate is analyzed using semantic similarity, skill relevance, production AI/ML experience, company quality, and Redrob behavioral signals to determine overall suitability. To improve ranking quality, the system applies disqualification gates that identify incomplete, inconsistent, or suspicious profiles and assign appropriate score penalties. All evaluation signals are normalized and combined using a weighted heuristic scoring mechanism to generate a final candidate score. The system also produces explainable reasoning for every ranked candidate using only verified profile information, ensuring transparency and preventing unsupported justifications. Finally, candidates are ranked in descending order based on their final scores, and the Top 100 candidates are exported to a CSV file. The modular architecture ensures scalability, maintainability, explainability, and efficient candidate ranking while complying with the challenge constraints of no network access during ranking and no use of external APIs.
